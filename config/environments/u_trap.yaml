# Compatible with: variational, mppi_navigation
# NOT compatible with: gridworld (thin box walls), spine
compatible_with: [variational, mppi_navigation]

start_pos: [0.0, 5.0]
goal_pos: [10.0, 5.0]
goal_weight: 40.0
velocity_weight: 10.0
control_weight: 0.5

boundary:
  enabled: true
  width: 14.0
  height: 10.0

obstacles:
  - type: box
    position: [6.0, 5.0]
    size: [0.5, 4.0]
    cost: 10000.0
    buffer: 0.5
  - type: box
    position: [4.25, 7.0]
    size: [4.0, 0.5]
    cost: 10000.0
    buffer: 0.5
  - type: box
    position: [4.25, 3.0]
    size: [4.0, 0.5]
    cost: 10000.0
    buffer: 0.5
